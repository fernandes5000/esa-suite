services:
  # WEB APP (Laravel + Livewire)
  web-app:
    build:
      context: .
      dockerfile: docker/php/web.Dockerfile
      args:
        - APP_ENV=${APP_ENV:-production}
    container_name: ${PROJECT_NAME}_web_app
    restart: unless-stopped
    working_dir: /var/www/web
    volumes:
     - ./web:/var/www/web:cached
    env_file:
      - ./web/.env
    networks:
      - esa-network
    depends_on:
      - mysql
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1

  web-nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}_web_nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./web:/var/www/web
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf
    networks:
      - esa-network
    depends_on:
      - web-app
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # API
  api-app:
    build:
      context: .
      dockerfile: docker/php/api.Dockerfile
      args:
        - APP_ENV=${APP_ENV:-production}
    container_name: ${PROJECT_NAME}_api_app
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./api:/var/www/api
    env_file:
      - ./api/.env
    networks:
      - esa-network
    depends_on:
      - mysql
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1

  api-nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}_api_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    networks:
      - esa-network
    depends_on:
      - api-app
    dns:
      - 8.8.8.8
      - 1.1.1.1

  mysql:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - esa-network

  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}_redis
    restart: unless-stopped
    networks:
      - esa-network

  adminer:
    image: adminer:latest
    container_name: ${PROJECT_NAME}_adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
    networks:
      - esa-network
    depends_on:
      - mysql

networks:
  esa-network:
    driver: bridge

volumes:
  mysql_data:
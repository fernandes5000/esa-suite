services:
  mysql:
    image: mysql:8.0
    container_name: esa-mysql
    environment:
      MYSQL_DATABASE: esa
      MYSQL_USER: esa
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["mysqld","--default-authentication-plugin=mysql_native_password"]

  redis:
    image: redis:7
    container_name: esa-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: esa-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
  adminer:
    image: adminer:latest
    container_name: esa-adminer
    ports:
      - "8082:8080"
    depends_on:
      - mysql


  api-app:
    build:
      context: ./api
      dockerfile: ../docker/php/api.Dockerfile
    container_name: esa-api-app
    env_file: ./api/.env
    volumes:
      - ./api:/var/www/html
    depends_on:
      - mysql
      - redis
    command: bash -lc "php-fpm"

  api-nginx:
    image: nginx:1.25
    container_name: esa-api-nginx
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    depends_on:
      - api-app

  web-app:
    build:
      context: ./web
      dockerfile: ../docker/php/web.Dockerfile
    container_name: esa-web-app
    env_file: ./web/.env
    volumes:
      - ./web:/var/www/html
    depends_on:
      - mysql
      - redis
      - api-nginx
    command: bash -lc "php-fpm"

  web-nginx:
    image: nginx:1.25
    container_name: esa-web-nginx
    volumes:
      - ./web:/var/www/html
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - web-app

volumes:
  mysql_data:

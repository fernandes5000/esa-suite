services:
  # ------------------------------------------------------
  # DATABASE (MySQL)
  # ------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ${DB_VOLUME_NAME:-mysql_data}:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"

  # ------------------------------------------------------
  # REDIS
  # ------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ------------------------------------------------------
  # API (Laravel backend)
  # ------------------------------------------------------
  api-app:
    build:
      context: ./api
      dockerfile: ../docker/php/api.Dockerfile
    container_name: ${PROJECT_NAME}_api_app
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - mysql
      - redis

  api-nginx:
    image: nginx:1.25
    container_name: ${PROJECT_NAME}_api_nginx
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api-app

  # ------------------------------------------------------
  # WEB (Laravel frontend)
  # ------------------------------------------------------
  web-app:
    build:
      context: ./web
      dockerfile: ../docker/php/web.Dockerfile
    container_name: ${PROJECT_NAME}_web_app
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./web:/var/www/html
      - /var/www/html/vendor         # vendor fica dentro do container
    depends_on:
      - mysql
      - redis
      - api-app

  web-nginx:
    image: nginx:1.25
    container_name: ${PROJECT_NAME}_web_nginx
    volumes:
      - ./web:/var/www/html
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - web-app

# ------------------------------------------------------
# VOLUMES
# ------------------------------------------------------
volumes:
  mysql_data:
  redis_data:

services:
  # ------------------------------------------------------
  #  WEB (Frontend Laravel + Vite)
  # ------------------------------------------------------
  web-app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_web_app
    working_dir: /var/www/html
    volumes:
      - ./web:/var/www/html
      - /var/www/html/vendor   # prevents vendor deletion
    environment:
      APP_ENV: ${APP_ENV}
    depends_on:
      - web-nginx

  web-nginx:
    image: nginx:latest
    container_name: ${COMPOSE_PROJECT_NAME}_web_nginx
    volumes:
      - ./web:/var/www/html
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - web-app

  # ------------------------------------------------------
  # API (Backend Laravel)
  # ------------------------------------------------------
  api-app:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_api_app
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor   # preserves vendor inside container
    environment:
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql
      - redis
      - api-nginx

  api-nginx:
    image: nginx:latest
    container_name: ${COMPOSE_PROJECT_NAME}_api_nginx
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    depends_on:
      - api-app

  # ------------------------------------------------------
  # DATABASE
  # ------------------------------------------------------
  mysql:
    image: mysql:8
    container_name: ${COMPOSE_PROJECT_NAME}_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3308:3306"

  # ------------------------------------------------------
  # REDIS
  # ------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: ${COMPOSE_PROJECT_NAME}_redis
    restart: always
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data

# ------------------------------------------------------
# VOLUMES
# ------------------------------------------------------
volumes:
  mysql_data:
  redis_data:

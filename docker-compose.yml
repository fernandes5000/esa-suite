services:
  # WEB (Laravel + Livewire + Vite)
  web-app:
    build:
      context: ./web
      dockerfile: ./docker/php/web.Dockerfile
    container_name: ${PROJECT_NAME}_web_app
    restart: unless-stopped
    working_dir: /var/www/web
    volumes:
      - ./web:/var/www/web
    env_file:
      - .env
    networks:
      - esa-network
    depends_on:
      - mysql
      - redis

  web-nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}_web_nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./web:/var/www/web
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf
    networks:
      - esa-network
    depends_on:
      - web-app

  # API
  api-app:
    build:
      context: ./api
      dockerfile: ./docker/php/api.Dockerfile
    container_name: ${PROJECT_NAME}_api_app
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./api:/var/www/api
    env_file:
      - .env
    networks:
      - esa-network
    depends_on:
      - mysql
      - redis

  api-nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}_api_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    networks:
      - esa-network
    depends_on:
      - api-app

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - esa-network
    ports:
      - "3308:3306"

  # Redis
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}_redis
    restart: unless-stopped
    networks:
      - esa-network
    ports:
      - "6379:6379"

networks:
  esa-network:
    driver: bridge

volumes:
  mysql_data:
version: "3.9"

services:
  # ------------------------------------------------------
  # WEB (Laravel frontend + Vite)
  # ------------------------------------------------------
  web-app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}_web_app
    working_dir: /var/www/html
    volumes:
      - ./web:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  web-nginx:
    image: nginx:latest
    container_name: ${PROJECT_NAME}_web_nginx
    volumes:
      - ./web:/var/www/html
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - web-app

  # ------------------------------------------------------
  # API (Laravel backend)
  # ------------------------------------------------------
  api-app:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}_api_app
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  api-nginx:
    image: nginx:latest
    container_name: ${PROJECT_NAME}_api_nginx
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    depends_on:
      - api-app

  # ------------------------------------------------------
  # MYSQL
  # ------------------------------------------------------
  mysql:
    image: mysql:8
    container_name: ${PROJECT_NAME}_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ------------------------------------------------------
  # REDIS
  # ------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}_redis
    restart: always
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data

# ------------------------------------------------------
# VOLUMES
# ------------------------------------------------------
volumes:
  mysql_data:
  redis_data:

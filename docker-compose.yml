services:
  # ------------------------------------------------------
  # WEB APP
  # ------------------------------------------------------
  web-app:
    build:
      context: ./web
      dockerfile: ../docker/php/web.Dockerfile
    container_name: ${PROJECT_NAME}_web_app
    working_dir: /var/www/html
    volumes:
      - ./web:/var/www/html
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  web-nginx:
    image: nginx:latest
    container_name: ${PROJECT_NAME}_web_nginx
    volumes:
      - ./web:/var/www/html
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - web-app

  # ------------------------------------------------------
  # API APP
  # ------------------------------------------------------
  api-app:
    build:
      context: ./api
      dockerfile: ../docker/php/api.Dockerfile
    container_name: ${PROJECT_NAME}_api_app
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  api-nginx:
    image: nginx:latest
    container_name: ${PROJECT_NAME}_api_nginx
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    depends_on:
      - api-app

  # ------------------------------------------------------
  # MYSQL
  # ------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}_mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3308:3306"

  # ------------------------------------------------------
  # REDIS
  # ------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}_redis
    volumes:
      - redis_data:/data
    ports:
      - "63790:6379"

volumes:
  mysql_data:
  redis_data:

name: Deploy ESA Project

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Define deploy variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-prod" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_PROD_BASE64 }}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "BRANCH=staging" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-stage" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_STAGE_BASE64 }}" >> $GITHUB_ENV
          else
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-dev" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_DEV_BASE64 }}" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            DIR_PATH="${{ env.DIR_PATH }}"
            BRANCH="${{ env.BRANCH }}"
            ENV_B64="${{ env.ENV_B64 }}"

            echo "Deploying to $DIR_PATH (branch: $BRANCH)"

            # Se não existe, clona limpo
            if [ ! -d "$DIR_PATH" ]; then
              echo "Primeiro deploy — clonando limpo..."
              rm -rf "$DIR_PATH"
              mkdir -p "$DIR_PATH"
              git clone https://github.com/${{ github.repository }}.git "$DIR_PATH"
              cd "$DIR_PATH"
            else
              cd "$DIR_PATH"
            fi

            # FORÇA RESET TOTAL (agora funciona porque tem sudo sem senha)
            echo "Resetando repositório com força bruta..."
            git fetch --all --prune --quiet
            git checkout "$BRANCH" --force
            git reset --hard "origin/$BRANCH" --quiet
            git clean -fdx --quiet

            # Garante que tudo pertence ao deployer
            sudo chown -R $(whoami):$(whoami) .

            # Escreve .env
            echo "$ENV_B64" | base64 -d > .env
            cp .env web/.env
            cp .env api/.env

            # Ajusta nomes
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify_API/' api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify/' web/.env

            # Corrige URLs da API no frontend
            if echo "$DIR_PATH" | grep -q "esa-dev"; then
              DOMAIN="esa-dev.engineer.ninja"
            elif echo "$DIR_PATH" | grep -q "esa-stage"; then
              DOMAIN="esa-stage.engineer.ninja"
            else
              DOMAIN="esa.engineer.ninja"
            fi

            sed -i "s|API_BASE_URL=.*|API_BASE_URL=http://api-nginx|" web/.env
            sed -i "s|API_URL=.*|API_URL=http://api-nginx/api|" web/.env
            sed -i "s|API_PUBLIC_URL=.*|API_PUBLIC_URL=https://$DOMAIN/api|" web/.env

            # Reconstrói tudo do zero
            echo "Recriando containers..."
            docker compose -f docker-compose.yml down --remove-orphans --volumes || true
            docker compose -f docker-compose.yml up -d --build --force-recreate
            docker compose up -d --build --force-recreate

            # Instala dependências
            echo "Instalando Composer..."
            docker compose exec -T web-app composer install --optimize-autoloader --no-dev --no-interaction
            docker compose exec -T api-app composer install --optimize-autoloader --no-dev --no-interaction

            echo "Build do frontend..."
            docker compose exec -T web-app npm install --no-save
            docker compose exec -T web-app npm run build

            echo "Migrations e cache..."
            docker compose exec -T api-app php artisan migrate --force
            docker compose exec -T web-app php artisan optimize:clear
            docker compose exec -T web-app php artisan config:cache
            docker compose exec -T web-app php artisan route:cache
            docker compose exec -T web-app php artisan view:cache
            docker compose exec -T api-app php artisan optimize

            echo "Limpando imagens antigas..."
            docker image prune -f

            echo "DEPLOY CONCLUÍDO COM SUCESSO!"
            echo "Frontend: https://$DOMAIN"
            echo "API: https://$DOMAIN/api"
          EOF

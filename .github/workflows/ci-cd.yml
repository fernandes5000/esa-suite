name: Deploy ESA Project

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Define deploy variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-prod" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_PROD_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa.engineer.ninja" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "BRANCH=staging" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-stage" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_STAGE_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa-stage.engineer.ninja" >> $GITHUB_ENV
          else
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-dev" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_DEV_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa-dev.engineer.ninja" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            cd "${{ env.DIR_PATH }}"

            # Git reset
            sudo git clean -fdx
            sudo git reset --hard
            git fetch --all --prune --quiet
            git checkout "${{ env.BRANCH }}" --force
            git reset --hard "origin/${{ env.BRANCH }}"

            # Domain
            case "${{ env.DIR_PATH }}" in
              *esa-dev*)   DOMAIN="esa-dev.engineer.ninja" ;;
              *esa-stage*) DOMAIN="esa-stage.engineer.ninja" ;;
              *)           DOMAIN="esa.engineer.ninja" ;;
            esac

            # .env
            echo "${{ env.ENV_B64 }}" | base64 -d > .env
            cp .env web/.env api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify_API/' api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify/' web/.env
            sed -i "s|API_BASE_URL=.*|API_BASE_URL=http://api-nginx|" web/.env
            sed -i "s|API_URL=.*|API_URL=http://api-nginx/api|" web/.env
            sed -i "s|API_PUBLIC_URL=.*|API_PUBLIC_URL=https://$DOMAIN/api|" web/.env

            # Permissions
            mkdir -p web/storage/framework/{cache,data,sessions,views} web/storage/logs web/bootstrap/cache
            mkdir -p api/storage/framework/{cache,data,sessions,views} api/storage/logs api/bootstrap/cache
            sudo chown -R www-data:www-data web/storage api/storage web/bootstrap/cache api/bootstrap/cache
            sudo chmod -R 775 web/storage api/storage web/bootstrap/cache api/bootstrap/cache

            # Docker
            docker compose down --remove-orphans --timeout 30 || true
            docker compose up -d --build --force-recreate
            sleep 15

            # Composer (critical — no -T, full visibility)
            docker compose exec web-app composer install --optimize-autoloader --no-dev --no-interaction || \
              (echo "WEB COMPOSER FAILED" && docker compose logs web-app && exit 1)

            docker compose exec api-app composer install --optimize-autoloader --no-dev --no-interaction || \
              (echo "API COMPOSER FAILED" && docker compose logs api-app && exit 1)

            # Database — dev = fresh, others = normal
            if echo "${{ env.DIR_PATH }}" | grep -q "esa-dev"; then
              echo "DEV: Running migrate:fresh --seed"
              docker compose exec api-app php artisan migrate:fresh --seed --force --verbose || \
                (echo "FRESH FAILED" && docker compose logs api-app && exit 1)
            else
              echo "Running standard migrate"
              docker compose exec api-app php artisan migrate --force --verbose || \
                (echo "MIGRATE FAILED" && docker compose logs api-app && exit 1)
              docker compose exec api-app php artisan db:seed --force --verbose || true
            fi

            # Vite build
            cd web
            rm -rf node_modules package-lock.json .vite public/build public/hot
            npm ci --legacy-peer-deps
            npm run build || npm run build -- --force
            [ -f "public/build/manifest.json" ] || (echo "VITE FAILED" && exit 1)
            echo "Vite build OK"
            cd ..

            # Laravel cache
            docker compose exec -T web-app php artisan optimize:clear
            docker compose exec -T web-app php artisan config:cache
            docker compose exec -T web-app php artisan route:cache
            docker compose exec -T web-app php artisan view:cache
            docker compose exec -T api-app php artisan optimize

            # Final message
            echo "=================================================="
            echo "   DEPLOY SUCCESSFUL!"
            echo "   Site  → https://$DOMAIN"
            echo "   API   → https://$DOMAIN/api"
            echo "=================================================="
          EOF
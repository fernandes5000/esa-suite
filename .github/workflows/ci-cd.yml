name: Deploy ESA Project

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Define deploy variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "DIR_PATH=/opt/docker/esa-prod" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_PROD_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa.engineer.ninja" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "BRANCH=staging" >> $GITHUB_ENV
            echo "DIR_PATH=/opt/docker/esa-stage" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_STAGE_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa-stage.engineer.ninja" >> $GITHUB_ENV
          else
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "DIR_PATH=/opt/docker/esa-dev" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_DEV_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa-dev.engineer.ninja" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Configure SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "Host ${{ secrets.SERVER_HOST }}" >> ~/.ssh/config
          echo "  ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  User ${{ secrets.SERVER_USER }}" >> ~/.ssh/config

      - name: Deploy over SSH
        env:
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -uxo pipefail

            DIR_PATH="${{ env.DIR_PATH }}"
            BRANCH="${{ env.BRANCH }}"
            ENV_B64="${{ env.ENV_B64 }}"
            
            export COMPOSE_PROJECT_NAME="esa_${BRANCH}"

            echo "Deploying to $DIR_PATH (branch: $BRANCH) with Project Name: $COMPOSE_PROJECT_NAME"

            # 1. Git Setup / Clone or Update
            if [ ! -d "$DIR_PATH/.git" ]; then
              echo "Directory does not exist or is not a git repository. Cloning..."
              mkdir -p "$DIR_PATH"
              git clone -b "$BRANCH" git@github.com:fernandes5000/esa-suite.git "$DIR_PATH"
              cd "$DIR_PATH"
            else
              echo "Directory exists. Fetching updates..."
              cd "$DIR_PATH"
              sudo git clean -fdx
              sudo git reset --hard
              git fetch --all --prune --quiet
              git checkout "$BRANCH" --force
              git reset --hard "origin/$BRANCH"
            fi

            # 2. Dynamic Domain
            if echo "$DIR_PATH" | grep -q "esa-dev"; then
              DOMAIN="esa-dev.engineer.ninja"
            elif echo "$DIR_PATH" | grep -q "esa-stage"; then
              DOMAIN="esa-stage.engineer.ninja"
            else
              DOMAIN="esa.engineer.ninja"
            fi

            # 3. Environment Setup
            echo "$ENV_B64" | base64 -d > .env
            cp .env web/.env
            cp .env api/.env

            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify_API/' api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify/' web/.env

            sed -i "s|API_BASE_URL=.*|API_BASE_URL=http://api-nginx|" web/.env
            sed -i "s|API_URL=.*|API_URL=http://api-nginx/api|" web/.env
            sed -i "s|API_PUBLIC_URL=.*|API_PUBLIC_URL=https://$DOMAIN/api|" web/.env

            # 4. Storage & permissions
            # www-data in php:8.4-fpm (Debian) is UID 33 / GID 33
            mkdir -p web/storage/framework/{cache,data,sessions,views} web/storage/logs web/bootstrap/cache
            mkdir -p api/storage/framework/{cache,data,sessions,views} api/storage/logs api/bootstrap/cache
            sudo chown -R 33:33 web/storage web/bootstrap/cache
            sudo chown -R 33:33 api/storage api/bootstrap/cache
            sudo chmod -R 775 web/storage web/bootstrap/cache
            sudo chmod -R 775 api/storage api/bootstrap/cache

            # 5. Docker Rebuild
            docker compose -f docker-compose.yml down --remove-orphans --timeout 30 || true
            docker compose -f docker-compose.yml up -d --build --force-recreate

            echo "=== WAITING FOR CONTAINERS TO BE READY ==="
            sleep 10

            # 6. Composer Install
            echo "=== WEB: composer install START ==="
            docker compose -f docker-compose.yml run --rm --no-deps -e COMPOSER_ALLOW_SUPERUSER=1 web-app composer install --working-dir=/var/www/web --optimize-autoloader --no-dev --no-interaction </dev/null
            echo "=== WEB: composer install DONE ==="

            echo "=== API: composer install START ==="
            docker compose -f docker-compose.yml run --rm --no-deps -e COMPOSER_ALLOW_SUPERUSER=1 api-app composer install --working-dir=/var/www/api --optimize-autoloader --no-dev --no-interaction </dev/null
            echo "=== API: composer install DONE ==="

            # 7. Database Migrations
            if echo "$DIR_PATH" | grep -q "esa-dev"; then
              echo "DEV MODE: Running migrate:fresh --seed"
              docker compose -f docker-compose.yml exec -T api-app php artisan migrate:fresh --seed --force </dev/null || echo "Migration failed"
            else
              echo "PROD/STAGE: Running normal migrate"
              docker compose -f docker-compose.yml exec -T api-app php artisan migrate --force </dev/null || echo "Migration failed"
            fi

            # 8. Vite Build
            echo "=== WEB: build assets START ==="
            cd web
            rm -rf node_modules public/build
            npm ci --legacy-peer-deps
            npm run build
            cd ..
            echo "=== WEB: build assets DONE ==="

            # 9. Laravel Optimization
            echo "=== OPTIMIZING CACHE ==="
            docker compose -f docker-compose.yml exec -T web-app php artisan optimize:clear </dev/null || true
            docker compose -f docker-compose.yml exec -T web-app php artisan config:cache </dev/null || true
            docker compose -f docker-compose.yml exec -T web-app php artisan route:cache </dev/null || true
            
            docker compose -f docker-compose.yml exec -T api-app php artisan optimize:clear </dev/null || true
            docker compose -f docker-compose.yml exec -T api-app php artisan config:cache </dev/null || true
            docker compose -f docker-compose.yml exec -T api-app php artisan route:cache </dev/null || true

            # 10. Final Checks
            echo "=== FINAL CHECK: WEB vendor ==="
            test -f web/vendor/autoload.php && echo "WEB OK" || echo "WEB FAILED"
            
            echo "=== FINAL CHECK: API vendor ==="
            test -f api/vendor/autoload.php && echo "API OK" || echo "API FAILED"

            # 11. Cleanup
            docker image prune -f || true

            echo "=================================================="
            echo "   DEPLOY COMPLETED SUCCESSFULLY!"
            echo "   Domain: https://$DOMAIN"
            echo "=================================================="
          EOF
name: Deploy ESA Project

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Define deploy variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-prod" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_PROD_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa.engineer.ninja" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "BRANCH=staging" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-stage" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_STAGE_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa-stage.engineer.ninja" >> $GITHUB_ENV
          else
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-dev" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_DEV_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa-dev.engineer.ninja" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -euxo pipefail

            DIR_PATH="${{ env.DIR_PATH }}"
            BRANCH="${{ env.BRANCH }}"
            ENV_B64="${{ env.ENV_B64 }}"

            echo "Deploying to $DIR_PATH (branch: $BRANCH)"
            cd "$DIR_PATH"

            # Git reset
            sudo git clean -fdx
            sudo git reset --hard
            git fetch --all --prune --quiet
            git checkout "$BRANCH" --force
            git reset --hard "origin/$BRANCH"

            # Dynamic domain
            if echo "$DIR_PATH" | grep -q "esa-dev"; then
              DOMAIN="esa-dev.engineer.ninja"
            elif echo "$DIR_PATH" | grep -q "esa-stage"; then
              DOMAIN="esa-stage.engineer.ninja"
            else
              DOMAIN="esa.engineer.ninja"
            fi

            # .env distribution
            echo "$ENV_B64" | base64 -d > .env
            cp .env web/.env
            cp .env api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify_API/' api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify/' web/.env
            sed -i "s|API_BASE_URL=.*|API_BASE_URL=http://api-nginx|" web/.env
            sed -i "s|API_URL=.*|API_URL=http://api-nginx/api|" web/.env
            sed -i "s|API_PUBLIC_URL=.*|API_PUBLIC_URL=https://$DOMAIN/api|" web/.env

            # Storage & permissions
            mkdir -p web/storage/framework/{cache,data,sessions,views} web/storage/logs web/bootstrap/cache
            mkdir -p api/storage/framework/{cache,data,sessions,views} api/storage/logs api/bootstrap/cache
            sudo chown -R www-data:www-data web/storage api/storage web/bootstrap/cache api/bootstrap/cache
            sudo chmod -R 775 web/storage api/storage web/bootstrap/cache api/bootstrap/cache

            # Docker rebuild
            docker compose down --remove-orphans --timeout 30 || true
            docker compose up -d --build --force-recreate

            echo "=== CONTAINER STATUS AFTER UP ==="
            docker compose ps

            echo "=== WAITING FOR web-app AND api-app ==="
            for i in $(seq 1 30); do
              WEB_CID=$(docker compose ps -q web-app || true)
              API_CID=$(docker compose ps -q api-app || true)

              WEB_STATUS="missing"
              API_STATUS="missing"

              if [ -n "${WEB_CID:-}" ]; then
                WEB_STATUS=$(docker inspect -f '{{.State.Status}}' "$WEB_CID" 2>/dev/null || echo "missing")
              fi

              if [ -n "${API_CID:-}" ]; then
                API_STATUS=$(docker inspect -f '{{.State.Status}}' "$API_CID" 2>/dev/null || echo "missing")
              fi

              echo "Attempt $i: web-app=$WEB_STATUS api-app=$API_STATUS"

              if [ "$WEB_STATUS" = "running" ] && [ "$API_STATUS" = "running" ]; then
                echo "Both app containers are running."
                break
              fi

              sleep 2
            done

            WEB_CID=$(docker compose ps -q web-app || true)
            API_CID=$(docker compose ps -q api-app || true)

            WEB_STATUS="missing"
            API_STATUS="missing"

            if [ -n "${WEB_CID:-}" ]; then
              WEB_STATUS=$(docker inspect -f '{{.State.Status}}' "$WEB_CID" 2>/dev/null || echo "missing")
            fi

            if [ -n "${API_CID:-}" ]; then
              API_STATUS=$(docker inspect -f '{{.State.Status}}' "$API_CID" 2>/dev/null || echo "missing")
            fi

            if [ "$WEB_STATUS" != "running" ] || [ "$API_STATUS" != "running" ]; then
              echo "One or more app containers are not running."
              docker compose ps
              docker compose logs web-app || true
              docker compose logs api-app || true
              exit 1
            fi

            # Composer install
            echo "=== WEB: composer install ==="
            docker compose exec -T web-app sh -lc "cd /var/www/web && COMPOSER_ALLOW_SUPERUSER=1 composer install --optimize-autoloader --no-dev --no-interaction"

            echo "=== API: composer install ==="
            docker compose exec -T api-app sh -lc "cd /var/www/api && COMPOSER_ALLOW_SUPERUSER=1 composer install --optimize-autoloader --no-dev --no-interaction"

            # Validate vendor
            echo "=== WEB: validate vendor ==="
            docker compose exec -T web-app sh -lc "cd /var/www/web && test -f vendor/autoload.php"

            echo "=== API: validate vendor ==="
            docker compose exec -T api-app sh -lc "cd /var/www/api && test -f vendor/autoload.php"

            # Database
            if echo "$DIR_PATH" | grep -q "esa-dev"; then
              echo "DEV: Running migrate:fresh --seed"
              docker compose exec -T api-app php artisan migrate:fresh --seed --force --verbose
            else
              echo "Running normal migrate"
              docker compose exec -T api-app php artisan migrate --force --verbose
              docker compose exec -T api-app php artisan db:seed --force --verbose || echo "No new seeders"
            fi

            # Vite build on host
            echo "Running Vite build on host..."
            cd web
            rm -rf node_modules .vite public/build public/hot
            npm ci --legacy-peer-deps
            npm run build
            test -f public/build/manifest.json
            cd ..

            # Laravel cache
            docker compose exec -T web-app php artisan optimize:clear
            docker compose exec -T web-app php artisan config:cache
            docker compose exec -T web-app php artisan route:cache
            docker compose exec -T web-app php artisan view:cache

            docker compose exec -T api-app php artisan optimize:clear
            docker compose exec -T api-app php artisan config:cache
            docker compose exec -T api-app php artisan route:cache

            # Cleanup
            docker image prune -f -a || true

            echo ""
            echo "=================================================="
            echo "   DEPLOY COMPLETED SUCCESSFULLY!"
            echo "   Site  → https://$DOMAIN"
            echo "   API   → https://$DOMAIN/api"
            echo "=================================================="
            echo ""
          EOF
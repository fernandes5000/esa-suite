name: Deploy ESA Project

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Define deploy variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-prod" >> $GITHUB_ENV
            echo "ENV_CONTENT=${{ secrets.ENV_PROD }}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "BRANCH=staging" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-stage" >> $GITHUB_ENV
            echo "ENV_CONTENT=${{ secrets.ENV_STAGE }}" >> $GITHUB_ENV
          else
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-dev" >> $GITHUB_ENV
            echo "ENV_CONTENT=${{ secrets.ENV_DEV }}" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            
            DIR_PATH="${{ env.DIR_PATH }}"
            BRANCH="${{ env.BRANCH }}"
            ENV_FILE_CONTENT="${{ env.ENV_CONTENT }}"

            # Clone if not exists
            if [ ! -d "\$DIR_PATH" ]; then
              git clone https://github.com/${{ github.repository }}.git "\$DIR_PATH"
            fi

            cd "\$DIR_PATH"

            git fetch
            git checkout "\$BRANCH"
            git pull origin "\$BRANCH"

            # Write .env files
            echo "\$ENV_FILE_CONTENT" > .env
            cp .env api/.env
            cp .env web/.env

            # Fix names
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify_API/' api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify/' web/.env

            # Pre-create Laravel folders
            mkdir -p web/storage/framework/{cache,views,sessions}
            mkdir -p web/bootstrap/cache
            mkdir -p api/storage/framework/{cache,views,sessions}
            mkdir -p api/bootstrap/cache

            # Make sure deployer owns all
            sudo chown -R \$USER:\$USER .

            # Docker recreate
            docker compose down || true
            docker compose -f docker-compose.yml pull || true
            docker compose -f docker-compose.yml up -d --build --remove-orphans

            # Delete vendor BEFORE reinstalling (prevent root-owned conflicts)
            docker compose exec -T web-app rm -rf vendor || true
            docker compose exec -T api-app rm -rf vendor || true

            # Composer install (WEB)
            docker compose exec -T web-app composer install --no-dev --optimize-autoloader --no-interaction

            # NPM build (WEB)
            docker compose exec -T web-app npm install
            docker compose exec -T web-app npm run build

            # Composer install (API)
            docker compose exec -T api-app composer install --no-dev --optimize-autoloader --no-interaction

            # Laravel commands WEB
            docker compose exec -T web-app php artisan clear-compiled
            docker compose exec -T web-app php artisan config:clear
            docker compose exec -T web-app php artisan cache:clear
            docker compose exec -T web-app php artisan config:cache
            docker compose exec -T web-app php artisan route:cache
            docker compose exec -T web-app php artisan view:cache

            # Laravel commands API
            docker compose exec -T api-app php artisan clear-compiled
            docker compose exec -T api-app php artisan config:clear
            docker compose exec -T api-app php artisan cache:clear
            docker compose exec -T api-app php artisan config:cache
            docker compose exec -T api-app php artisan route:cache
            docker compose exec -T api-app php artisan migrate --force

            # Final permissions to www-data
            docker compose exec -T -u root web-app chown -R www-data:www-data /var/www/html
            docker compose exec -T -u root api-app chown -R www-data:www-data /var/www/html

            docker image prune -af || true
EOF

name: Deploy ESA Project

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Define deploy variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-prod" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_PROD_BASE64 }}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "BRANCH=staging" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-stage" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_STAGE_BASE64 }}" >> $GITHUB_ENV
          else
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-dev" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_DEV_BASE64 }}" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            DIR_PATH="${{ env.DIR_PATH }}"
            BRANCH="${{ env.BRANCH }}"
            ENV_B64="${{ env.ENV_B64 }}"

            echo "Deploying to $DIR_PATH (branch: $BRANCH)"

            if [ ! -d "$DIR_PATH/.git" ]; then
              echo "First time deploy — cloning..."
              rm -rf "$DIR_PATH"
              git clone https://github.com/${{ github.repository }}.git "$DIR_PATH"
            fi

            cd "$DIR_PATH"

            git fetch origin
            git checkout "$BRANCH"
            git reset --hard origin/$BRANCH
            git clean -fd

            echo "$ENV_B64" | base64 -d > .env
            cp .env web/.env
            cp .env api/.env

            # Ajusta nomes dos apps
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify_API/' api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify/' web/.env

            # Corrige URLs da API no .env do frontend
            sed -i "s|API_BASE_URL=.*|API_BASE_URL=http://api-nginx|" web/.env
            sed -i "s|API_URL=.*|API_URL=http://api-nginx/api|" web/.env
            sed -i "s|API_PUBLIC_URL=.*|API_PUBLIC_URL=https://$(echo $DIR_PATH | grep -oE 'esa-(dev|stage|prod)' | sed 's/esa-//').engineer.ninja/api|" web/.env

            echo "Rebuilding containers..."
            docker compose down --remove-orphans
            docker compose up -d --build

            echo "Installing dependencies..."
            docker compose exec -T web-app composer install --optimize-autoloader --no-dev --no-interaction
            docker compose exec -T api-app composer install --optimize-autoloader --no-dev --no-interaction

            docker compose exec -T web-app npm install && npm run build

            docker compose exec -T api-app php artisan migrate --force
            docker compose exec -T web-app php artisan optimize
            docker compose exec -T api-app php artisan optimize

            docker image prune -f

            echo "Deploy concluído com sucesso!"
          EOF

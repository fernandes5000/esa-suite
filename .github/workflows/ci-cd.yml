name: Deploy ESA Project

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Define deploy variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-prod" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_PROD_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa.engineer.ninja" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "BRANCH=staging" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-stage" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_STAGE_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa-stage.engineer.ninja" >> $GITHUB_ENV
          else
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "DIR_PATH=/home/deployer/esa-dev" >> $GITHUB_ENV
            echo "ENV_B64=${{ secrets.ENV_DEV_BASE64 }}" >> $GITHUB_ENV
            echo "DOMAIN=esa-dev.engineer.ninja" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -euxo pipefail

            DIR_PATH="${{ env.DIR_PATH }}"
            BRANCH="${{ env.BRANCH }}"
            ENV_B64="${{ env.ENV_B64 }}"

            echo "Deploying to $DIR_PATH (branch: $BRANCH)"
            cd "$DIR_PATH"

            # 1. Git Cleanup & Update
            sudo git clean -fdx
            sudo git reset --hard
            git fetch --all --prune --quiet
            git checkout "$BRANCH" --force
            git reset --hard "origin/$BRANCH"

            # 2. Dynamic domain detection
            if echo "$DIR_PATH" | grep -q "esa-dev"; then
              DOMAIN="esa-dev.engineer.ninja"
            elif echo "$DIR_PATH" | grep -q "esa-stage"; then
              DOMAIN="esa-stage.engineer.ninja"
            else
              DOMAIN="esa.engineer.ninja"
            fi

            # 3. Environment Setup
            echo "$ENV_B64" | base64 -d > .env
            cp .env web/.env
            cp .env api/.env

            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify_API/' api/.env
            sed -i 's/^APP_NAME=.*/APP_NAME=PetCertify/' web/.env

            sed -i "s|API_BASE_URL=.*|API_BASE_URL=http://api-nginx|" web/.env
            sed -i "s|API_URL=.*|API_URL=http://api-nginx/api|" web/.env
            sed -i "s|API_PUBLIC_URL=.*|API_PUBLIC_URL=https://$DOMAIN/api|" web/.env

            # 4. Storage & permissions setup
            mkdir -p web/storage/framework/{cache,data,sessions,views} web/storage/logs web/bootstrap/cache
            mkdir -p api/storage/framework/{cache,data,sessions,views} api/storage/logs api/bootstrap/cache
            sudo chown -R www-data:www-data web/storage api/storage web/bootstrap/cache api/bootstrap/cache
            sudo chmod -R 775 web/storage api/storage web/bootstrap/cache api/bootstrap/cache

            # 5. Docker Rebuild
            docker compose down --remove-orphans --timeout 30 || true
            docker compose up -d --build --force-recreate

            echo "=== WAITING FOR CONTAINERS TO BE READY ==="
            sleep 5

            # 6. Composer Install - WEB
            echo "=== WEB: composer install START ==="
            docker compose exec -T web-app sh -c "cd /var/www/web && COMPOSER_ALLOW_SUPERUSER=1 composer install --optimize-autoloader --no-dev --no-interaction"
            echo "=== WEB: composer install DONE ==="

            # 7. Composer Install - API
            echo "=== API: composer install START ==="
            docker compose exec -T api-app sh -c "cd /var/www/api && COMPOSER_ALLOW_SUPERUSER=1 composer install --optimize-autoloader --no-dev --no-interaction"
            echo "=== API: composer install DONE ==="

            # 8. Database Migrations
            if echo "$DIR_PATH" | grep -q "esa-dev"; then
              echo "DEV MODE: Running migrate:fresh --seed"
              docker compose exec -T api-app php artisan migrate:fresh --seed --force
            else
              echo "PROD/STAGE: Running normal migrate"
              docker compose exec -T api-app php artisan migrate --force
            fi

            # 9. Vite Build (Executed on Host)
            echo "=== WEB: build assets START ==="
            cd web
            rm -rf node_modules public/build
            npm ci --legacy-peer-deps
            npm run build
            cd ..
            echo "=== WEB: build assets DONE ==="

            # 10. Laravel Optimization
            echo "=== OPTIMIZING CACHE ==="
            docker compose exec -T web-app php artisan optimize:clear
            docker compose exec -T web-app php artisan config:cache
            docker compose exec -T web-app php artisan route:cache
            
            docker compose exec -T api-app php artisan optimize:clear
            docker compose exec -T api-app php artisan config:cache
            docker compose exec -T api-app php artisan route:cache

            # 11. Cleanup old images
            docker image prune -f || true

            echo "=================================================="
            echo "   DEPLOY COMPLETED SUCCESSFULLY!"
            echo "   Domain: https://$DOMAIN"
            echo "=================================================="
          EOF